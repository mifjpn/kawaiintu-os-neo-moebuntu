<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaiintu OS - Proving Ground</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            border: 1px solid #333;
            padding: 40px;
            background-color: #1a1a1a;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        }
        h1 {
            font-size: 2.5em;
            text-align: center;
            margin-top: 0;
            text-shadow: 0 0 5px #00ff00;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }
        .message {
            margin: 30px 0;
            line-height: 1.6;
        }
        .en {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .ja {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        .links {
            text-align: center;
            margin-top: 40px;
        }
        a {
            color: #ff007f;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.3em;
            display: block;
            margin: 15px 0;
            padding: 10px;
            border: 1px dashed #ff007f;
            transition: all 0.3s ease;
        }
        a:hover {
            background-color: #ff007f;
            color: #0d0d0d;
            box-shadow: 0 0 10px #ff007f;
        }
        .slow-link {
            color: #aaa;
            border-color: #555;
            font-size: 1em;
        }
        .slow-link:hover {
            background-color: #555;
            color: #fff;
            box-shadow: 0 0 10px #555;
        }
        .prompt::before {
            content: "root@kawaiintu:~# ";
            color: #ff007f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kawaiintu OS</h1>
        
        <div class="message">
            <div class="en prompt">Welcome to the proving ground.</div>
            <div class="ja">＞ 実力テスト会場へようこそ。</div>
            
            <div class="en prompt">I dare you to crash it on a 2GB RAM VM.</div>
            <div class="ja">＞ 2GBのVM環境でクラッシュさせてみろ。</div>
            
            <div class="en prompt">Show me what you got.</div>
            <div class="ja">＞ お前らの実力を見せてみろ。</div>
        </div>
        
        <div class="links">
            <a href="#" target="_blank">[ MEGA ] Primary Download (High Speed)</a>
            
            <a href="#" target="_blank" class="slow-link">[ Internet Archive ] Mirror (Slow)</a>
        </div>
    </div>
</body>
</html>
